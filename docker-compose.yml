services:
  node:
    build:
      context: ./web
      dockerfile: ../Dockerfile-node
    ports:
      - "8084:8084"
    networks:
      - app-network
    environment:
      - API_URL=http://server:8091

  server:
    build:
      context: .
      dockerfile: Dockerfile-server
      target: server
      args:
        - VOSK_MODEL_SIZE=${VOSK_MODEL_SIZE:-small}
        - TTS_MODEL=${TTS_MODEL:-vits-melo-tts-zh_en}
        - DOWNLOAD_PROXY=${BUILD_PROXY:-}
      cache_from:
        - eclipse-temurin:21-jre
    ports:
      - "8091:8091"
    networks:
      - app-network
    environment:
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-43.142.238.69}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-88H3HfSBj6wTKHp4}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${MYSQL_HOST:-43.142.238.69}:${MYSQL_PORT:-3306}/xiaozhi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-xiaozhi}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-ScbawGf2MmXkEFp6}
      - HOST_IP=${HOST_IP:-43.142.238.69}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  dialogue:
    build:
      context: .
      dockerfile: Dockerfile-server
      target: dialogue
      args:
        - VOSK_MODEL_SIZE=${VOSK_MODEL_SIZE:-small}
        - TTS_MODEL=${TTS_MODEL:-vits-melo-tts-zh_en}
        - DOWNLOAD_PROXY=${BUILD_PROXY:-}
      cache_from:
        - eclipse-temurin:21-jre
    ports:
      - "8092:8092"
    networks:
      - app-network
    environment:
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-43.142.238.69}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-88H3HfSBj6wTKHp4}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${MYSQL_HOST:-43.142.238.69}:${MYSQL_PORT:-3306}/xiaozhi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-xiaozhi}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-ScbawGf2MmXkEFp6}
      - HOST_IP=${HOST_IP:-43.142.238.69}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  app-network:
    driver: bridge
